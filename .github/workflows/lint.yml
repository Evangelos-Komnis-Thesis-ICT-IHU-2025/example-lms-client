name: Lint

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  php-lint:
    name: Laravel PHP Syntax Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint Laravel PHP files
        run: |
          set -euo pipefail
          find lms-laravel/app lms-laravel/config lms-laravel/routes lms-laravel/database/migrations -name '*.php' -print0 \
            | xargs -0 -n1 php -l
