name: LMS Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: lms-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Laravel Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout LMS repo
        uses: actions/checkout@v4

      - name: Checkout SDK repo (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SCORM_SDK_REPOSITORY || format('{0}/scorm-engine-php-sdk', github.repository_owner) }}
          path: _sdk

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          extensions: mbstring, sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Prepare SDK path dependency
        run: |
          set -euo pipefail
          ln -sfn "${GITHUB_WORKSPACE}/_sdk" "${GITHUB_WORKSPACE}/../scorm-engine-php-sdk"

      - name: Install dependencies
        working-directory: lms-laravel
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        working-directory: lms-laravel
        run: |
          set -euo pipefail
          cp .env.example .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=file/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=file/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          touch database/database.sqlite
          php artisan key:generate --force --ansi
          php artisan migrate --force --ansi

      - name: Run tests with coverage
        working-directory: lms-laravel
        run: |
          mkdir -p build/logs
          php artisan test --ansi --coverage-clover build/logs/clover.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: example-lms-client-clover-xml
          path: lms-laravel/build/logs/clover.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: lms-laravel/build/logs/clover.xml
          flags: example-lms-client
